<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | TechTracker</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <nav>
        <div class="logo" style="color:white; font-weight:bold;">TechTracker</div>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/inventory">Inventory</a></li>
            <li><a href="/register">Register Device</a></li>
        </ul>
    </nav>
    <main>
        <h1>Register New Hardware</h1>
        <img src="/images/server.png" alt="Local server icon" style="width:50px;">

        <form id="deviceForm">
            <label for="name">Device Name:</label>
            <input type="text" id="name" required>

            <label for="type">Device Type:</label>
            <select id="type">
                <option value="Laptop">Laptop</option>
                <option value="Desktop">Desktop</option>
                <option value="Server">Server</option>
            </select>

            <label>Operating System:</label>
            <div>
                <input type="radio" name="os" value="Windows" checked> Windows
                <input type="radio" name="os" value="Linux"> Linux
            </div>

            <label for="ip">IP Address (Special Input):</label>
            <input type="text" id="ip" placeholder="192.168.1.1" required>

            <label>
                <input type="checkbox" id="confirm"> Information is accurate
            </label>

            <button type="submit">Add Device</button>
            <div id="msg"></div>
        </form>
    </main>
    <script src="/script.js"></script>
</body>
</html>
